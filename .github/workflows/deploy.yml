name: Vercel Deployment
on:
  push:
    branches:
      - master
      - develop
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_YEQVwSWyTNfalmtA7lrShuvp
      VERCEL_PROJECT_ID: prj_C6dIycuodnENa1O9Hbpn12dxT5Cr
    steps:
      - uses: actions/checkout@v3
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy to Vercel (Master)
        if: github.ref == 'refs/heads/master'
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          vercel alias set $DEPLOY_URL confort-travel-public.vercel.app --token=${{ secrets.VERCEL_TOKEN }} --scope=team_YEQVwSWyTNfalmtA7lrShuvp

      - name: Deploy to Vercel (Develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          vercel alias set $DEPLOY_URL your-travel-confort.vercel.app --token=${{ secrets.VERCEL_TOKEN }} --scope=team_YEQVwSWyTNfalmtA7lrShuvp
